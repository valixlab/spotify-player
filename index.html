<!DOCTYPE html>
<html>
    <head>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
        <meta charset="utf-8">
        <title>Mini player</title>
        <style>
            :root {
                --color: #1DB954;
                --c-rgb: 29, 185, 84;
                --svg: #000000;
            }
            * { box-sizing: border-box;}
            html, body {
                width: 100%;
                height: 100%;
                margin: 0;
                padding: 0;
                overflow: hidden;

            }
            html {
                margin: 0;
                padding: 0;
                border: 1px solid rgba(255, 255, 255, 0.1);
                border-radius: 20px;
            }
            body {
                margin: 0;
                position: relative;
                background: linear-gradient(0deg, #131418, #27282B);
            }
            @property --pos {
                syntax: '<percentage>';
                initial-value: 0%;
                inherits: false;
            }

            #ray {
                border-radius: 20px;
                height: 100%;
                background: linear-gradient(60deg,
                    rgba(255,255,255,0) calc(var(--pos) - 20%),
                    rgba(var(--c-rgb), 0.4) var(--pos),
                    rgba(255,255,255,0) calc(var(--pos) + 20%)
                );
                animation: movePos 6s linear infinite;
            }

            @keyframes movePos {
                0% { --pos: 200%; }
                100%   { --pos: -20%; }
            }
            #buttons {
                position: relative;
                z-index: 1;
            }
            #controls {
                position: relative;
                z-index: 2;
            }
            #close-container {
                position: absolute;
                left: 344px;
                top: 8px;
                width: 24px;
                height: 24px;
                background: rgb(255,255,255,0.07);
                border-radius:100%;
                display: flex;
                align-items: center;
                justify-content: center;
                transition: background 300ms;
            }
            #close-container:hover {
                background: rgb(255,255,255,0.15);
                cursor: pointer;
            }
            #close {
                --1m973uw: rgb(255,255,255,0.72);
                position: relative;
                width: 13px;
                height: 13px;
                transition: transform 300ms;
            }
            #close-container:hover #close {
                transform: scale(120%);
                cursor: pointer;
            }
            #close-container:active #close {
                transform: scale(80%);
            }
            #sett-container {
                position: absolute;
                left: 315px;
                top: 8px;
                width: 24px;
                height: 24px;
                background: rgb(255,255,255,0.07);
                border-radius:100%;
                display: flex;
                align-items: center;
                justify-content: center;
                transition: background 300ms;
            }
            #sett-container:hover {
                background: rgb(255,255,255,0.15);
                cursor: pointer;
            }
            #sett {
                position: relative;
                width: 13px;
                height: 13px;
                transition: transform 300ms;
            }
            #sett-container:hover #sett{
                transform: scale(120%);
                cursor: pointer;
            }
            #sett-container:active #sett {
                transform: scale(80%);
            }
            #popup-color {
                position: absolute;
                width : 170px;
                height : 30px;
                z-index: 1;
                left : 200px;
                top : 45px;
                background: linear-gradient(0deg, #131418, #27282B);
                border: 1px solid rgba(255, 255, 255, 0.1);
                border-radius: 20px;
                display: flex;
                flex-direction: row;
                justify-content: center;
                align-items: center;

                opacity: 0;
                visibility: hidden;
                transform: translateY(-15px);
                transition: opacity 250ms ease, transform 250ms ease, visibility 250ms;
                pointer-events: none;
            }
            #popup-color.visible {
                opacity: 1;
                visibility: visible;
                transform: translateY(0);
                pointer-events: auto;
            }
            #popup-color-circle {
                position: absolute;
                fill: #27282B;
                left: 317px;
                top: 35px;
                opacity: 0;
                visibility: hidden;
                transition: opacity 250ms ease, visibility 250ms;
            }
            #popup-color-circle.visible {
                opacity: 1;
                visibility: visible;
            }
            #popup-color-circle circle {
                stroke : rgba(255, 255, 255, 0.1);
                stroke-width: 1px;
            }
            #input-color {
                margin-left: 5px;
                margin-right : 5px;
                width : 30px;
                height: 30px;
                border: none;
                -webkit-appearance: none;
                -moz-appearance: none;
                appearance: none;
                background-color: transparent;
                transition : transform 300ms;
            }
            #input-color:hover {
                transform: scale(110%);
            }
            #color-text {
                text-align: center;
                font-family : "Inter", sans-serif;
                font-weight: 600;
                font-size: 12px;
                color: white;
                width: 80px;
                height: 20px;
                background: linear-gradient(90deg, #131418, #27282B);
                border: 1px solid rgb(255,255,255,0.1);
                border-radius: 15px;
            }
            #color-text-container2 {
                width: 80px;
                height: 20px;
                border-radius: 15px;
                box-shadow: 2px 2px 5px rgba(0, 0, 0, 0.4),-2px -2px 5px rgba(255, 255, 255, 0.1);
            }
            #color-text-container {
                margin-right : 5px;
                border-radius: 15px;
                width: 80px;
                height: 20px;
                display: flex;
                align-items: center;
                transition: transform 300ms;
            }
            #color-text-container:hover {
                transform: scale(110%);
            }
            #checkbox {
                appearance: none;
                -webkit-appearance: none;
                -moz-appearance: none;
                margin-left: 5px;
                width: 20px;
                height: 20px;
                border: 1px solid rgba(255, 255, 255, 0.3);
                border-radius: 4px;
                background: transparent;
                display: grid;
                place-content: center;
                cursor: pointer;
            }

            #checkbox::before {
                content: "";
                width: 12px;
                height: 12px;
                transform: scale(0);
                transition: 120ms transform ease-in-out;
                box-shadow: inset 1em 1em var(--color);
            }

            #checkbox:checked::before {
                transform: scale(1);
            }

            #checkbox:checked {
                border-color: var(--color);
            }
            #miniplayer {
                display: flex;
                flex-direction: row;
                padding : 12px;
            }
            #info {
                margin-left: 12px;
                display: flex;
                flex-direction: column;
            }
            #pochette {
                position: relative;
                display: block;
                width: 64px;
                height: 64px;
                border-radius: 12px;
                background: linear-gradient(146deg,rgba(232, 179, 179, 1) 0%, rgba(255, 255, 255, 1) 100%);
                object-fit: cover;
            }
            #titre {
                position: relative;
                height: 15.4px;
                font-family : "Inter", sans-serif;
                font-weight: 600;
                font-size: 14px;
                color: rgb(255,255,255,0.96);
            }
            #controls {
                display: flex;
                flex-direction: row;
                align-items: center;
                gap: 8px;
                height: 26px;
            }
            #artiste {
                height: 12;
                font-family : "Inter", sans-serif;
                font-size: 12px;
                color: rgb(255,255,255,0.57);

            }
            .btn-container {
                width: 24px;
                height: 24px;
                background: rgb(255,255,255,0.07);
                border-radius:100%;
                display: flex;
                align-items: center;
                justify-content: center;
                transition: background 300ms;
            }
            .btn-container:hover {
                background: rgb(255,255,255,0.15);
                cursor: pointer;
            }
            .btn {
                --1m973uw: rgb(255,255,255,0.72);
                position: relative;
                width: 13px;
                height: 13px;
                transition: transform 300ms;
            }
            .btn:hover {
                transform: scale(120%);
                cursor: pointer;
            }
            .btn:active {
                transform: scale(80%);
            }
            #pause-container {
                width: 24px;
                height: 24px;
                background: rgba(var(--c-rgb), 0.9);
                border-radius:100%;
                display: flex;
                align-items: center;
                justify-content: center;
                transition: background 300ms;
            }
            #pause-container:hover {
                background: rgba(var(--c-rgb), 0.6);
                cursor: pointer;
            }
            #icon-pause {
                position: relative;
                width: 13px;
                height: 13px;
                transition: transform 300ms;
            }
            #pause-container:hover #icon-pause {
                transform: scale(120%);
                cursor: pointer;
            }
            #icon-play {
                position: relative;
                width: 13px;
                height: 13px;
                transition: transform 300ms;
            }
            #pause-container:hover #icon-play {
                transform: scale(120%);
                cursor: pointer;
            }
            #volume-icon {
                --1m973uw: rgb(255,255,255,0.48);
                position: relative;
                width: 14px;
                height: 14px;
                margin-left: 5px;
            }
            #volume {
                -webkit-appearance: none;
                appearance: none;
                width: 60px;
                height: 6px;
                border-radius: 2px;
                background: linear-gradient(to right, 
                    var(--color) 0%, 
                    var(--color) var(--val, 70%), 
                    rgb(255,255,255,0.12) var(--val, 70%), 
                    rgb(255,255,255,0.12) 100%);
                outline: none;
                cursor: pointer;
            }
            #volume::-webkit-slider-thumb {
                -webkit-appearance: none;
                width: 10px;
                height: 10px;
                border-radius: 50%;
                background: var(--color);
                cursor: pointer;
            }
            #volume::-moz-range-thumb {
                width: 10px;
                height: 10px;
                border-radius: 50%;
                background: var(--color);
                border: none;
                cursor: pointer;
            }
            #volume::-moz-range-track {
                background: rgb(255,255,255,0.12);
                height: 6px;
                border-radius: 2px;
            }
            #volume::-moz-range-progress {
                background: var(--color);
                height: 6px;
                border-radius: 2px;
            }
            #barre {
                height: 6px;
                background: rgb(255,255,255,0.12);
                border-radius: 2px;
                margin-top: 8px;
                overflow: hidden;
            }
            #progression {
                height: 100%;
                background: var(--color);
                width: 0%;
                transition: width 0.3s linear;
            }
        </style>
    </head>

            <circle cx="10" cy="10" r="10"></circle>

    <script>
        let can_change_icon = true;

        const miniplayer = document.getElementById('miniplayer');
                document.querySelectorAll('.no-drag').forEach(e => { e.addEventListener('mousedown', () => miniplayer.classList.remove('pywebview-drag-region')); });

        document.addEventListener('mouseup', () => {
            setTimeout(() => { miniplayer.classList.add('pywebview-drag-region'); }, 50);
        });

        function prev() { pywebview.api.previous_track(); }
        function pause() {
            can_change_icon = false;
            setTimeout(() => {
                can_change_icon = true;
            }, 100);
            pywebview.api.play_pause();
            if (document.getElementById("icon-play").style.display == "none") { document.getElementById("icon-play").style.display = "block"; document.getElementById("icon-pause").style.display = "none"; }
            else { document.getElementById("icon-play").style.display = "none"; document.getElementById("icon-pause").style.display = "block"; }
        }
        function next() { pywebview.api.next_track(); }
        function closeWindow() { pywebview.api.close_window(); }

        const volumeSlider = document.getElementById('volume');
        function updateSliderFill(el) {
            const percent = (el.value - el.min) / (el.max - el.min) * 100;
            el.style.setProperty('--val', percent + '%');
        }
        volumeSlider.addEventListener('input', () => {
            updateSliderFill(volumeSlider);
            pywebview.api.set_volume(volumeSlider.value);
        });
        async function initVolume() {
            const vol = await pywebview.api.get_volume();
            volumeSlider.value = Math.round(parseFloat(vol) * 100);
            updateSliderFill(volumeSlider);
        }
        window.addEventListener('pywebviewready', initVolume);

        function hexToRgb(hex) {
            hex = hex.replace('#', '');
            if (hex.length === 3) {
                hex = hex.split('').map(c => c + c).join('');
            }
            const r = parseInt(hex.substring(0, 2), 16);
            const g = parseInt(hex.substring(2, 4), 16);
            const b = parseInt(hex.substring(4, 6), 16);
            return [`${r}, ${g}, ${b}`, [r,g,b]];
        }

        function setColor(hex) {
            document.documentElement.style.setProperty('--color', hex);
            htr = hexToRgb(hex);
            document.documentElement.style.setProperty('--c-rgb', htr[0]);
            lum = htr[1][0]+htr[1][1]+htr[1][2];
            if (lum<330) { document.documentElement.style.setProperty('--svg', "#ffffff"); } 
            else { document.documentElement.style.setProperty('--svg', "#000000"); }
        }

        function color() {
            const popup = document.getElementById("popup-color");
            const circle = document.getElementById("popup-color-circle");
            popup.classList.toggle("visible");
            circle.classList.toggle("visible");
        }

        const inputColor = document.getElementById('input-color');
        const colorText = document.getElementById('color-text');

        inputColor.addEventListener('input', () => {
            colorText.value = inputColor.value;
        });
        colorText.addEventListener('input', () => {
            const val = colorText.value.trim();
            if (/^#([0-9A-Fa-f]{3}|[0-9A-Fa-f]{6})$/.test(val)) {
                inputColor.value = val;
            }
        });
        colorText.addEventListener('change', () => {
            let val = colorText.value.trim();
            if (/^#([0-9A-Fa-f]{3})$/.test(val)) {
                val = '#' + val.slice(1).split('').map(c => c + c).join('');
            }
            if (/^#([0-9A-Fa-f]{6})$/.test(val)) {
                inputColor.value = val;
                colorText.value = val;
            } else {
                colorText.value = inputColor.value;
            }
        });

        function moyImg(img) {
            if (!img.naturalWidth || !img.naturalHeight) {
                console.warn("Image sans dimensions valides (pas encore chargée ?)");
                return null;
            }
            const canvas = document.createElement('canvas');
            canvas.width = img.naturalWidth;
            canvas.height = img.naturalHeight;

            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0);

            const imgDt = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imgDt.data;

            let R = 0, G = 0, B = 0;
            const nbPixels = data.length / 4;

            for (let i = 0; i < data.length; i += 4) {
                R += data[i];
                G += data[i + 1];
                B += data[i + 2];
            }

            R = Math.round(R / nbPixels);
            G = Math.round(G / nbPixels);
            B = Math.round(B / nbPixels);


            const versHex = (valeur) => valeur.toString(16).padStart(2, '0');
            return `#${versHex(R)}${versHex(G)}${versHex(B)}`;
        }

        const checkbox = document.getElementById("checkbox");
        checkbox.addEventListener('change', () => {
            if (checkbox.checked) {
                pywebview.api.set_auto("true");
            } else {
                pywebview.api.set_auto("false");
            }
        });

        let last_value = "";
        function updateInfo(data) {
            const checkbox = document.getElementById("checkbox");
            if (data.auto == "true") { 
                checkbox.checked = true;
                const img = document.getElementById("pochette");
                if (img.complete) {
                    const c = moyImg(img);
                    if (c != null) {
                        pywebview.api.print(c);
                        setColor(c);
                        pywebview.api.change_color(c);
                    }
                    
                }
            }
            else { 
                checkbox.checked = false; 
                if (document.getElementById("color-text").value != last_value) {
                    setColor(document.getElementById("color-text").value)
                    last_value = document.getElementById("color-text").value;
                    pywebview.api.change_color(document.getElementById("color-text").value);
                }
            }

            if (!document.getElementById("popup-color").classList.contains("visible")) {
                document.getElementById("input-color").value = data.color;
                document.getElementById("color-text").value = data.color;
            }
            if (data.pochette) {
                document.getElementById("pochette").src = data.pochette;
                document.getElementById("pochette").style.background = "rgb(0,0,0,0)";
            } else { document.getElementById("pochette").style.background = "linear-gradient(146deg,rgba(232, 179, 179, 1) 0%, rgba(255, 255, 255, 1) 100%)";}
            if (data.titre) document.getElementById('titre').innerText = data.titre;
            if (data.artiste) document.getElementById('artiste').innerText = data.artiste;
            if (can_change_icon) {
                if (data.status == "Paused") { document.getElementById("icon-play").style.display = "block"; document.getElementById("icon-pause").style.display = "none"; }
                else { document.getElementById("icon-play").style.display = "none"; document.getElementById("icon-pause").style.display = "block"; } 
            }
            const pos = parseFloat(data.position) || 0;
            const duree = (parseFloat(data.duree) || 0) / 1000000;
            const pct = duree > 0 ? (pos / duree) * 100 : 0;
            if (pct>0) document.getElementById('progression').style.width = pct + '%';
        }
    </script>
</html>
